name: Publish Extension
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm --prefix media-src install
      - run: npm exec foy build
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT != '' && secrets.VSCE_PAT || secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "No Marketplace token configured in VSCE_PAT or VS_MARKETPLACE_TOKEN" >&2
            exit 1
          fi
          npx @vscode/vsce publish -p "$VSCE_PAT"
